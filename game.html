<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>숲속의 스도쿠 (Forest Sudoku)</title>
    <link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&display=swap" rel="stylesheet">
    <style>
      <div class="hidden md:flex space-x-10 text-sm font-semibold uppercase tracking-widest">
                <a href="#about" class="hover:text-blue-400 transition-colors">About</a>
                <a href="#skills" class="hover:text-blue-400 transition-colors">Skills</a>
                <a href="#projects" class="hover:text-blue-400 transition-colors">Projects</a>
                <a href="#contact" class="hover:text-blue-400 transition-colors">Contact</a>
                <a href="https://bjs99629-sudo.github.io/poterpolarbear/game.html" class="hover:text-blue-400 transition-colors">Game</a>
            </div>
        
        :root {
            --bg-color: #fdfae6;
            --board-bg: #89c168;
            --cell-bg: #fffcf0;
            --cell-fixed: #e2f3d5;
            --accent-color: #f19066;
            --text-color: #5d4037;
            --border-color: #558b2f;
            --highlight: #fff59d;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: var(--bg-color);
            font-family: 'Gaegu', cursive;
            color: var(--text-color);
            background-image: radial-gradient(#d4efc7 1px, transparent 1px);
            background-size: 20px 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        .header h1 {
            font-size: 3rem;
            margin: 10px 0;
            text-shadow: 2px 2px 0px white;
            color: #4a7c2c;
        }

        .leaf-icon {
            width: 50px;
            fill: #7cb342;
        }

        .container {
            background: var(--board-bg);
            padding: 10px;
            border-radius: 20px;
            box-shadow: 0 10px 0 #558b2f, 0 15px 20px rgba(0,0,0,0.1);
            position: relative;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(9, 45px);
            grid-template-rows: repeat(9, 45px);
            border: 4px solid var(--border-color);
            background: var(--border-color);
            gap: 2px;
        }

        @media (max-width: 500px) {
            .grid {
                grid-template-columns: repeat(9, 35px);
                grid-template-rows: repeat(9, 35px);
            }
        }

        .cell {
            width: 100%;
            height: 100%;
            background: var(--cell-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
            user-select: none;
        }

        .cell:hover {
            background: var(--highlight);
        }

        .cell.fixed {
            background: var(--cell-fixed);
            color: #2e7d32;
        }

        .cell.selected {
            background: #ffe082 !important;
            outline: 3px inset #ffa000;
        }

        /* Thick borders for 3x3 zones */
        .cell:nth-child(3n) { border-right: 2px solid var(--border-color); }
        .cell:nth-child(9n) { border-right: none; }
        .grid > .cell:nth-child(n+19):nth-child(-n+27),
        .grid > .cell:nth-child(n+46):nth-child(-n+54) {
            border-bottom: 2px solid var(--border-color);
        }

        .controls {
            margin-top: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .numpad {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
        }

        .btn-num {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: none;
            background: white;
            box-shadow: 0 4px 0 #ddd;
            font-size: 1.5rem;
            font-family: 'Gaegu', cursive;
            cursor: pointer;
            color: var(--text-color);
            transition: transform 0.1s, box-shadow 0.1s;
        }

        .btn-num:active {
            transform: translateY(4px);
            box-shadow: 0 0 0 #ddd;
        }

        .btn-action {
            padding: 10px 25px;
            border-radius: 30px;
            border: none;
            background: var(--accent-color);
            color: white;
            font-size: 1.2rem;
            font-family: 'Gaegu', cursive;
            cursor: pointer;
            box-shadow: 0 4px 0 #d35400;
        }

        .btn-action:active {
            transform: translateY(4px);
            box-shadow: 0 0 0 #d35400;
        }

        .message-box {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 30px;
            border-radius: 25px;
            border: 6px solid var(--board-bg);
            box-shadow: 0 0 50px rgba(0,0,0,0.2);
            text-align: center;
            display: none;
            z-index: 100;
        }

        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.3);
            display: none;
            z-index: 90;
        }
    </style>
</head>
<body>

<div class="header">
    <svg class="leaf-icon" viewBox="0 0 24 24">
        <path d="M17,8C8,10 5.9,16.17 3.82,21.34L5.71,22L6.66,19.7C7.14,19.87 7.64,20 8,20C19,20 22,3 22,3C21,5 14,5.25 9,6.25C4,7.25 2,11.5 2,13.5C2,15.5 3.75,17.25 3.75,17.25C7,8 17,8 17,8Z" />
    </svg>
    <h1>숲속의 스도쿠</h1>
    <p>나뭇잎을 채워 스도쿠를 완성해 보세요!</p>
</div>

<div class="container">
    <div id="grid" class="grid"></div>
</div>

<div class="controls">
    <div class="numpad">
        <button class="btn-num" onclick="inputNumber(1)">1</button>
        <button class="btn-num" onclick="inputNumber(2)">2</button>
        <button class="btn-num" onclick="inputNumber(3)">3</button>
        <button class="btn-num" onclick="inputNumber(4)">4</button>
        <button class="btn-num" onclick="inputNumber(5)">5</button>
        <button class="btn-num" onclick="inputNumber(6)">6</button>
        <button class="btn-num" onclick="inputNumber(7)">7</button>
        <button class="btn-num" onclick="inputNumber(8)">8</button>
        <button class="btn-num" onclick="inputNumber(9)">9</button>
        <button class="btn-num" onclick="inputNumber(0)" style="font-size: 1rem;">지우기</button>
    </div>
    <div style="display: flex; gap: 10px;">
        <button class="btn-action" onclick="generateNewGame()">새 게임</button>
        <button class="btn-action" style="background-color: #7cb342; box-shadow: 0 4px 0 #558b2f;" onclick="checkSolution()">정답 확인</button>
    </div>
</div>

<div id="overlay" class="overlay"></div>
<div id="messageBox" class="message-box">
    <h2 id="messageTitle">대단해요!</h2>
    <p id="messageContent">마을의 평화가 찾아왔어요!</p>
    <button class="btn-action" onclick="closeMessage()">닫기</button>
</div>

<script>
    let selectedCell = null;
    let board = [];
    let initialBoard = [];

    // Initialize the grid
    const gridElement = document.getElementById('grid');

    function createGrid() {
        gridElement.innerHTML = '';
        for (let i = 0; i < 81; i++) {
            const cell = document.createElement('div');
            cell.classList.add('cell');
            cell.dataset.index = i;
            cell.addEventListener('click', () => selectCell(cell));
            gridElement.appendChild(cell);
        }
    }

    function selectCell(cell) {
        if (selectedCell) selectedCell.classList.remove('selected');
        selectedCell = cell;
        selectedCell.classList.add('selected');
    }

    function inputNumber(num) {
        if (!selectedCell || selectedCell.classList.contains('fixed')) return;
        
        const idx = parseInt(selectedCell.dataset.index);
        const val = num === 0 ? "" : num;
        
        selectedCell.innerText = val;
        board[idx] = num === 0 ? 0 : num;
    }

    // Very simple Sudoku Generator (Mock for this implementation)
    // In a production app, we would use a more robust backtracking algorithm
    function generateNewGame() {
        // Base solution to shuffle
        const base = [
            5, 3, 4, 6, 7, 8, 9, 1, 2,
            6, 7, 2, 1, 9, 5, 3, 4, 8,
            1, 9, 8, 3, 4, 2, 5, 6, 7,
            8, 5, 9, 7, 6, 1, 4, 2, 3,
            4, 2, 6, 8, 5, 3, 7, 9, 1,
            7, 1, 3, 9, 2, 4, 8, 5, 6,
            9, 6, 1, 5, 3, 7, 2, 8, 4,
            2, 8, 7, 4, 1, 9, 6, 3, 5,
            3, 4, 5, 2, 8, 6, 1, 7, 9
        ];
        
        // Basic "Shuffling" (simple version)
        board = [...base];
        initialBoard = Array(81).fill(0);
        
        const cells = document.querySelectorAll('.cell');
        cells.forEach((cell, i) => {
            cell.classList.remove('fixed', 'selected');
            // Randomly hide about 50% of cells
            if (Math.random() > 0.4) {
                cell.innerText = board[i];
                cell.classList.add('fixed');
                initialBoard[i] = board[i];
            } else {
                cell.innerText = "";
                board[i] = 0;
            }
        });
        
        selectedCell = null;
    }

    function checkSolution() {
        // Simple check: are there any zeros?
        if (board.includes(0)) {
            showMessage("아직 비어있는 칸이 있어요!", "모든 칸을 채워야 정답을 확인할 수 있어요.");
            return;
        }

        // Validate rows, columns, and 3x3 grids (basic logic)
        const isValid = validateSudoku(board);
        if (isValid) {
            showMessage("완벽해요!", "정말 대단한 실력이네요! 숲속 친구들이 기뻐해요.");
        } else {
            showMessage("어라라...?", "어딘가 틀린 부분이 있는 것 같아요. 다시 확인해 볼까요?");
        }
    }

    function validateSudoku(arr) {
        const check = (vals) => {
            const s = new Set(vals.filter(v => v !== 0));
            return s.size === 9;
        };

        // Rows
        for (let i = 0; i < 9; i++) {
            if (!check(arr.slice(i * 9, i * 9 + 9))) return false;
        }
        // Cols
        for (let i = 0; i < 9; i++) {
            let col = [];
            for (let j = 0; j < 9; j++) col.push(arr[i + j * 9]);
            if (!check(col)) return false;
        }
        return true;
    }

    function showMessage(title, content) {
        document.getElementById('messageTitle').innerText = title;
        document.getElementById('messageContent').innerText = content;
        document.getElementById('overlay').style.display = 'block';
        document.getElementById('messageBox').style.display = 'block';
    }

    function closeMessage() {
        document.getElementById('overlay').style.display = 'none';
        document.getElementById('messageBox').style.display = 'none';
    }

    // Keyboard support
    document.addEventListener('keydown', (e) => {
        if (e.key >= '1' && e.key <= '9') {
            inputNumber(parseInt(e.key));
        } else if (e.key === 'Backspace' || e.key === 'Delete' || e.key === '0') {
            inputNumber(0);
        }
    });

    // Start game
    createGrid();
    generateNewGame();

</script>

</body>
</html>
